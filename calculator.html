<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    </link>
    <script defer src="script.js"></script>
</head>

<body>
    <div class="calculator">
        <div class="container">
            <div class="display-top">0</div>
            <div class="display-bottom">0</div>
        </div>
        <div class="container-bottom">
            <div class="num-container">
                <button id="9" class="numbers">9</button>
                <button id="8" class="numbers">8</button>
                <button id="7" class="numbers">7</button>
                <button id="6" class="numbers">6</button>
                <button id="5" class="numbers">5</button>
                <button id="4" class="numbers">4</button>
                <button id="3" class="numbers">3</button>
                <button id="2" class="numbers">2</button>
                <button id="1" class="numbers">1</button>
                <button id="dot" class="numbers">.</button>
                <button id="0" class="numbers">0</button>
                <button id="back" class="numbers back">DEL</button>
            </div>
            <div class="op-container">
                <button data-action="clear" class="clear">A/C</button>
                <button data-action="add" class="operators">+</button>
                <button data-action="subtract" class="operators">-</button>
                <button data-action="multiply" class="operators">×</button>
                <button data-action="divide" class="operators">÷</button>
                <button id="equals" class="equals">=</button>
            </div>
        </div>
    </div>

</body>

</html>
